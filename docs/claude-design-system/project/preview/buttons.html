<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; font: 500 14px/1 var(--font-sans); border: 0; border-radius: var(--r-3); cursor: pointer; transition: filter .15s, transform .05s; }
  .btn:active { transform: translateY(1px); }
  .b-primary { background: var(--c-purple); color: #fff; box-shadow: var(--sh-2); }
  .b-primary:hover { filter: brightness(1.1); }
  .b-info    { background: var(--c-blue); color: #fff; }
  .b-success { background: var(--c-teal); color: #fff; }
  .b-quiet   { background: var(--bg-surface-2); color: var(--fg-primary); box-shadow: inset 0 0 0 1px var(--border-default); }
  .b-ghost   { background: transparent; color: var(--fg-secondary); }
  .b-ghost:hover { background: var(--bg-surface-2); }
  .b-danger  { background: rgba(239,68,68,0.10); color: var(--c-danger); box-shadow: inset 0 0 0 1px rgba(239,68,68,0.30); }
  .b-icon    { padding: 9px; border-radius: var(--r-3); }
  .pill      { padding: 6px 12px; font-size: 12px; border-radius: var(--r-pill); }
</style></head><body>
<button class="btn b-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New Task</button>
<button class="btn b-info"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>Send Email</button>
<button class="btn b-success"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>Search Jobs</button>
<button class="btn b-quiet">Chat AI</button>
<button class="btn b-ghost">Cancel</button>
<button class="btn b-danger">Stop agent</button>
<button class="btn b-quiet b-icon" aria-label="settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
<button class="btn b-quiet pill">Filter: All</button>
<button class="btn b-quiet pill"><span style="width:6px;height:6px;border-radius:50%;background:var(--c-success);display:inline-block"></span>Online</button>
</body></html>
