<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; max-width: 760px; }
  .card { background: var(--bg-surface); border-radius: var(--r-5); padding: 16px; box-shadow: inset 0 0 0 1px var(--border-default); }
  .h { font: 500 11px/1 var(--font-sans); color: var(--fg-muted); }
  .v { font: 700 24px/1 var(--font-sans); color: var(--fg-primary); margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .delta { display: inline-flex; align-items: center; gap: 4px; font: 500 11px/1 var(--font-sans); margin-left: 8px; padding: 2px 6px; border-radius: var(--r-pill); }
  .up { color: var(--c-success); background: rgba(34,197,94,0.12); }
  .down { color: var(--c-danger); background: rgba(239,68,68,0.12); }
  .sub { font: 500 11px/1.3 var(--font-sans); color: var(--fg-faint); margin-top: 6px; }
  /* Bars */
  .bars { margin-top: 14px; height: 64px; display: flex; align-items: end; gap: 4px; }
  .bars span { flex: 1; border-radius: 2px 2px 0 0; background: linear-gradient(180deg,var(--c-purple-2),var(--c-purple)); }
  .days { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 6px; font: 500 10px/1 var(--font-mono); color: var(--fg-faint); text-align: center; }
  /* Donut */
  .donut { display: grid; place-items: center; height: 96px; margin-top: 10px; }
  /* Line */
  .line { margin-top: 14px; height: 64px; }
  .line svg { display: block; width: 100%; height: 100%; }
</style></head><body>

<div class="card">
  <div class="h">Email Volume <span class="delta up">+24%</span></div>
  <div class="v">156</div>
  <div class="sub">Last 7 days</div>
  <div class="bars">
    <span style="height:35%"></span><span style="height:55%"></span><span style="height:42%"></span><span style="height:78%"></span><span style="height:64%"></span><span style="height:88%"></span><span style="height:48%"></span>
  </div>
  <div class="days"><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span><span>Mon</span><span>Tue</span></div>
</div>

<div class="card">
  <div class="h">Task Completion</div>
  <div class="sub">This week</div>
  <div class="donut">
    <svg width="96" height="96" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg-surface-3)" stroke-width="12"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="var(--c-green)" stroke-width="12" stroke-dasharray="251" stroke-dashoffset="45" stroke-linecap="round" transform="rotate(-90 50 50)"/>
      <text x="50" y="55" text-anchor="middle" font-family="Inter" font-weight="700" font-size="20" fill="#F1F4FB">82%</text>
    </svg>
  </div>
</div>

<div class="card">
  <div class="h">Job Applications</div>
  <div class="v">62 <span class="delta up">+8</span></div>
  <div class="sub">This month</div>
  <div class="line">
    <svg viewBox="0 0 200 60" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lg1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#F59E0B" stop-opacity="0.40"/><stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/></linearGradient>
      </defs>
      <path d="M0 50 L25 38 L50 42 L75 28 L100 32 L125 18 L150 24 L175 14 L200 10 L200 60 L0 60 Z" fill="url(#lg1)"/>
      <path d="M0 50 L25 38 L50 42 L75 28 L100 32 L125 18 L150 24 L175 14 L200 10" fill="none" stroke="#F59E0B" stroke-width="2"/>
    </svg>
  </div>
</div>

</body></html>
