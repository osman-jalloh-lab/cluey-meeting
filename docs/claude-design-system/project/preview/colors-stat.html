<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .swatch { border-radius: var(--r-3); overflow: hidden; box-shadow: var(--sh-2); }
  .chip { aspect-ratio: 1.6/1; display: flex; flex-direction: column; justify-content: space-between; padding: 14px; color: #fff; }
  .name { font: 600 13px/1 var(--font-sans); letter-spacing: -0.01em; }
  .hex  { font: 500 11px/1 var(--font-mono); opacity: 0.85; }
  .role { font: 500 10px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
</style></head><body>
<div class="swatch"><div class="chip" style="background:#3B82F6"><div class="role">Email</div><div><div class="name">Blue 500</div><div class="hex">#3B82F6</div></div></div></div>
<div class="swatch"><div class="chip" style="background:#8B5CF6"><div class="role">Calendar</div><div><div class="name">Purple 500</div><div class="hex">#8B5CF6</div></div></div></div>
<div class="swatch"><div class="chip" style="background:#10B981"><div class="role">Tasks</div><div><div class="name">Green 500</div><div class="hex">#10B981</div></div></div></div>
<div class="swatch"><div class="chip" style="background:#F59E0B"><div class="role">Jobs</div><div><div class="name">Orange 500</div><div class="hex">#F59E0B</div></div></div></div>
<div class="swatch"><div class="chip" style="background:#14B8A6"><div class="role">API · Cost</div><div><div class="name">Teal 500</div><div class="hex">#14B8A6</div></div></div></div>
<div class="swatch"><div class="chip" style="background:#EC4899"><div class="role">Agents</div><div><div class="name">Pink 500</div><div class="hex">#EC4899</div></div></div></div>
</body></html>
