<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: flex; flex-direction: column; gap: 14px; max-width: 720px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font: 600 11px/1 var(--font-sans); letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-muted); }
  .input { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg-surface); border-radius: var(--r-3); box-shadow: inset 0 0 0 1px var(--border-default); transition: box-shadow .15s; }
  .input:focus-within { box-shadow: inset 0 0 0 1px var(--c-purple), 0 0 0 3px rgba(139,92,246,0.18); }
  .input svg { color: var(--fg-muted); flex-shrink: 0; }
  .input input, .input textarea { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-primary); font: 400 14px/1.5 var(--font-sans); }
  .input input::placeholder, .input textarea::placeholder { color: var(--fg-faint); }
  textarea { resize: none; min-height: 60px; }
  .row { display: flex; gap: 8px; }
  .toggle { display: inline-flex; padding: 3px; background: var(--bg-surface); border-radius: var(--r-pill); box-shadow: inset 0 0 0 1px var(--border-default); }
  .toggle button { padding: 6px 14px; border-radius: var(--r-pill); border: 0; background: transparent; font: 500 12px/1 var(--font-sans); color: var(--fg-muted); cursor: pointer; }
  .toggle button.on { background: var(--c-purple); color: #fff; box-shadow: var(--sh-2); }
  .checkbox { display: inline-flex; align-items: center; gap: 8px; font: 500 13px/1 var(--font-sans); color: var(--fg-secondary); cursor: pointer; }
  .check { width: 16px; height: 16px; border-radius: 4px; background: var(--bg-surface); box-shadow: inset 0 0 0 1px var(--border-strong); display: grid; place-items: center; }
  .check.on { background: var(--c-green); box-shadow: none; }
  .check.on svg { color: #fff; }
  .switch { width: 36px; height: 20px; border-radius: 10px; background: var(--bg-surface-2); position: relative; box-shadow: inset 0 0 0 1px var(--border-default); cursor: pointer; }
  .switch.on { background: var(--c-success); box-shadow: none; }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left .15s; }
  .switch.on::after { left: 18px; }
</style></head><body>

<div class="field">
  <label>Search</label>
  <div class="input">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input placeholder="Search agents, tasks, files…">
    <kbd style="color:var(--fg-faint);font:500 11px/1 var(--font-mono)">⌘K</kbd>
  </div>
</div>

<div class="field">
  <label>Brief the agent</label>
  <div class="input"><textarea placeholder="Find 5 React engineers in Berlin who've shipped a Three.js project and queue intro emails."></textarea></div>
</div>

<div class="field">
  <label>View mode</label>
  <div class="toggle"><button class="on">Office</button><button>Dashboard</button><button>Analytics</button></div>
</div>

<div class="row" style="gap:24px; align-items: center;">
  <label class="checkbox"><span class="check on"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>Reduce motion</label>
  <label class="checkbox"><span class="check"></span>Sound notifications</label>
  <label class="checkbox" style="margin-left:auto"><span class="switch on"></span>Live mode</label>
</div>

</body></html>
