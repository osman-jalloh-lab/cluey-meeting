<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .swatch { border-radius: var(--r-3); overflow: hidden; }
  .chip { aspect-ratio: 1.6/1; display: flex; flex-direction: column; justify-content: space-between; padding: 14px; }
  .light { color: var(--fg-primary); }
  .name { font: 600 13px/1 var(--font-sans); letter-spacing: -0.01em; }
  .hex  { font: 500 11px/1 var(--font-mono); opacity: 0.7; }
  .role { font: 500 10px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
  .border { box-shadow: inset 0 0 0 1px var(--border-default); }
</style></head><body>
<div class="swatch"><div class="chip light border" style="background:#0E1424"><div class="role">Page</div><div><div class="name">Midnight 950</div><div class="hex">#0E1424</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#131B2E"><div class="role">Rail</div><div><div class="name">Midnight 900</div><div class="hex">#131B2E</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#1A2336"><div class="role">Surface</div><div><div class="name">Midnight 800</div><div class="hex">#1A2336</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#222C42"><div class="role">Surface 2</div><div><div class="name">Midnight 700</div><div class="hex">#222C42</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#2B3650"><div class="role">Surface 3</div><div><div class="name">Midnight 600</div><div class="hex">#2B3650</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#28324A"><div class="role">Border</div><div><div class="name">Slate 700</div><div class="hex">#28324A</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#364266"><div class="role">Border ↑</div><div><div class="name">Slate 600</div><div class="hex">#364266</div></div></div></div>
<div class="swatch"><div class="chip light border" style="background:#5A6582"><div class="role">Faint text</div><div><div class="name">Slate 400</div><div class="hex">#5A6582</div></div></div></div>
</body></html>
