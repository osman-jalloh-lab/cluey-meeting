<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px; display: flex; flex-direction: column; gap: 20px; }
  .demo { display: flex; align-items: center; gap: 18px; }
  .label { color: var(--fg-muted); width: 130px; flex-shrink: 0; }
  .frame { background: #0a0e1a; padding: 16px 22px; border-radius: var(--r-3); flex: 1; box-shadow: inset 0 0 0 1px var(--border-default); }
  .meta { color: var(--fg-faint); font: 500 11px/1.4 var(--font-mono); }
</style></head><body>
<div class="demo">
  <div class="label t-caption">PIXEL · ROOM</div>
  <div class="frame"><div class="t-pixel-lg" style="color:#FCD34D">CEO OFFICE</div></div>
  <div class="meta">Press Start 2P · 16</div>
</div>
<div class="demo">
  <div class="label t-caption">PIXEL · LABEL</div>
  <div class="frame"><div class="t-pixel" style="color:#F1F4FB">EMAIL MANAGER</div></div>
  <div class="meta">Press Start 2P · 11</div>
</div>
<div class="demo">
  <div class="label t-caption">PIXEL · BUBBLE</div>
  <div class="frame"><div class="t-pixel-body" style="color:#1A2336;background:#F1F4FB;display:inline-block;padding:6px 12px;border-radius:8px">Processing emails…</div></div>
  <div class="meta">VT323 · 18</div>
</div>
<div class="demo">
  <div class="label t-caption">PIXEL · STATUS</div>
  <div class="frame"><div class="t-pixel-body" style="color:#34D399">▶ ONLINE · 12 AGENTS</div></div>
  <div class="meta">VT323 · 18</div>
</div>
</body></html>
