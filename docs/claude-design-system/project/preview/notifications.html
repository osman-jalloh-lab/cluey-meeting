<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: flex; flex-direction: column; gap: 12px; max-width: 600px; }
  .toast { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--r-4); background: var(--bg-surface-2); box-shadow: inset 0 0 0 1px var(--border-default), var(--sh-2); }
  .toast .ico { width: 28px; height: 28px; border-radius: var(--r-2); display: grid; place-items: center; flex-shrink: 0; }
  .toast .t { flex: 1; }
  .toast .l1 { font: 600 13px/1.2 var(--font-sans); color: var(--fg-primary); }
  .toast .l2 { font: 500 12px/1.3 var(--font-sans); color: var(--fg-muted); margin-top: 2px; }
  .toast .x { color: var(--fg-faint); cursor: pointer; }
  .stripe { width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; margin: -2px 0; }
  /* Bubble */
  .bubble-wrap { display: flex; align-items: end; gap: 8px; padding: 16px; background: #0a0e1a; border-radius: var(--r-3); box-shadow: inset 0 0 0 1px var(--border-default); }
  .pixel-char { width: 56px; height: 56px; image-rendering: pixelated; flex-shrink: 0; background: linear-gradient(160deg,#3B82F6,#1E5BD0); border-radius: 4px; position: relative; }
  .pixel-char::after { content: ""; position: absolute; left: 18px; top: 14px; width: 20px; height: 12px; background: #FCD34D; border-radius: 2px; }
  .pixel-char::before { content: ""; position: absolute; left: 14px; bottom: 8px; width: 28px; height: 20px; background: #1F2937; border-radius: 3px; }
  .bubble { position: relative; padding: 8px 12px; background: #F1F4FB; color: #131B2E; border-radius: 6px; font: 400 18px/1 var(--font-pixel-readable); }
  .bubble::after { content: ""; position: absolute; left: -6px; bottom: 8px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 6px solid #F1F4FB; }
</style></head><body>

<div class="toast">
  <div class="stripe" style="background:var(--c-success)"></div>
  <div class="ico" style="background:rgba(34,197,94,0.15);color:var(--c-success)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <div class="t"><div class="l1">Task completed</div><div class="l2">"Update SOC2 evidence" finished by Task Coordinator</div></div>
  <div class="x">✕</div>
</div>

<div class="toast">
  <div class="stripe" style="background:var(--c-warning)"></div>
  <div class="ico" style="background:rgba(245,158,11,0.15);color:var(--c-warning)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
  <div class="t"><div class="l1">Approval needed</div><div class="l2">Job Search Agent wants to send 4 outreach emails</div></div>
  <div class="x">✕</div>
</div>

<div class="toast">
  <div class="stripe" style="background:var(--c-danger)"></div>
  <div class="ico" style="background:rgba(239,68,68,0.15);color:var(--c-danger)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
  <div class="t"><div class="l1">Rate limit reached</div><div class="l2">Email Manager paused — retrying in 60s</div></div>
  <div class="x">✕</div>
</div>

<div class="bubble-wrap">
  <div class="pixel-char"></div>
  <div class="bubble">Processing emails…</div>
</div>

</body></html>
