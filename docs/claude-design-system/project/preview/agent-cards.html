<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; max-width: 760px; }
  .agent { background: var(--bg-surface); border-radius: var(--r-5); padding: 14px; box-shadow: inset 0 0 0 1px var(--border-default); display: flex; align-items: center; gap: 12px; transition: background .15s; }
  .agent:hover { background: var(--bg-surface-2); }
  .av { width: 44px; height: 44px; border-radius: var(--r-3); display: grid; place-items: center; font: 400 16px/1 var(--font-pixel); color: #fff; flex-shrink: 0; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25); }
  .meta { flex: 1; min-width: 0; }
  .name { font: 600 13px/1.2 var(--font-sans); color: var(--fg-primary); }
  .role { font: 500 11px/1.3 var(--font-sans); color: var(--fg-muted); margin-top: 2px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: var(--r-pill); font: 500 11px/1 var(--font-sans); }
  .online { color: var(--c-success); background: rgba(34,197,94,0.10); }
  .busy { color: var(--c-orange); background: rgba(245,158,11,0.10); }
  .idle { color: var(--c-info); background: rgba(56,189,248,0.10); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
</style></head><body>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#3B82F6,#1E5BD0)">EM</div><div class="meta"><div class="name">Email Manager</div><div class="role">Processing inbox · 12 unread</div></div><span class="pill online"><span class="dot"></span>Online</span></div>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#8B5CF6,#5B2EC8)">CM</div><div class="meta"><div class="name">Calendar Manager</div><div class="role">Reviewing today's events</div></div><span class="pill busy"><span class="dot"></span>Busy</span></div>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#10B981,#0A7C5A)">TC</div><div class="meta"><div class="name">Task Coordinator</div><div class="role">Organizing 34 pending tasks</div></div><span class="pill online"><span class="dot"></span>Online</span></div>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#F59E0B,#B26E04)">JS</div><div class="meta"><div class="name">Job Search Agent</div><div class="role">Scanning new listings</div></div><span class="pill busy"><span class="dot"></span>Busy</span></div>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#14B8A6,#0A7C73)">DA</div><div class="meta"><div class="name">Data Analyst</div><div class="role">Building Q2 report</div></div><span class="pill online"><span class="dot"></span>Online</span></div>
<div class="agent"><div class="av" style="background:linear-gradient(160deg,#EC4899,#B12973)">SG</div><div class="meta"><div class="name">Security Guardian</div><div class="role">Idle · last active 4m</div></div><span class="pill idle"><span class="dot"></span>Idle</span></div>
</body></html>
